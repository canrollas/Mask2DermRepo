# Mask2Derm Training Configuration
# Reproduces the settings from the paper (single NVIDIA A100)

# --- Model ---
base_model: "SG161222/Realistic_Vision_V5.1_noVAE"
controlnet_model: "lllyasviel/sd-controlnet-seg"

# --- Data ---
data_dir: "data/processed"
resolution: 256
apply_lens_simulation: true

# --- Training ---
train_batch_size: 64                 # A100 40GB ~35-38GB kullanır
gradient_accumulation_steps: 1       # batch 64 x accum 1 = 64 (aynı effective batch)
num_train_epochs: 100
mixed_precision: "bf16"              # BF16: ~2x faster, same effective batch size
dataloader_num_workers: 8            # A100 makinelerinde daha fazla CPU var
torch_compile: true                  # PyTorch 2.0+ ile ~%20-30 hız kazancı

# --- Optimizer (AdamW) ---
learning_rate: 1.0e-5
lr_scheduler: "cosine"
lr_warmup_steps: 500
adam_beta1: 0.9
adam_beta2: 0.999
adam_weight_decay: 0.01
adam_epsilon: 1.0e-8
max_grad_norm: 1.0

# --- Output paths ---
output_dir: "/content/drive/MyDrive/Mask2DermRepo/outputs/mask2derm"
checkpoint_dir: "/content/drive/MyDrive/Mask2DermRepo/outputs/checkpoints"
samples_dir: "/content/drive/MyDrive/Mask2DermRepo/outputs/samples"

# --- Checkpointing & Logging ---
logging_steps: 50
validation_steps: 500                    # generate validation samples every N steps
num_validation_images: 4
tracker: "wandb"
tracker_project: "mask2derm"

# --- Epoch samples (saved at end of each epoch) ---
num_epoch_samples: 4                     # how many cancer images to generate per epoch
epoch_samples_steps: 20                  # DDIM steps for epoch sample generation

# --- Inference defaults (used during validation) ---
validation_prompt: "dermoscopy image of a malignant skin lesion, irregular borders, clinical photography"
num_inference_steps: 20
guidance_scale: 7.5
