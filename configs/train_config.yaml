# Mask2Derm Training Configuration — SDXL
# SG161222/RealVisXL_V4.0 (SDXL) + ControlNet seg

# --- Model ---
base_model: "SG161222/RealVisXL_V4.0"
controlnet_model: "xinsir/controlnet-seg-sdxl-1.0"

# --- Data ---
data_dir: "data/processed"
resolution: 1024
apply_lens_simulation: true

# --- Training ---
train_batch_size: 4                  # 1024x1024: A100 80GB ~60-70GB kullanır
gradient_accumulation_steps: 16      # effective batch: 4 x 16 = 64
num_train_epochs: 100
mixed_precision: "bf16"
dataloader_num_workers: 8
torch_compile: false                 # SDXL + compile zaman zaman sorun çıkarır

# --- Optimizer (AdamW) ---
learning_rate: 1.0e-5
lr_scheduler: "cosine"
lr_warmup_steps: 500
adam_beta1: 0.9
adam_beta2: 0.999
adam_weight_decay: 0.01
adam_epsilon: 1.0e-8
max_grad_norm: 1.0

# --- Output paths ---
output_dir: "/content/drive/MyDrive/Mask2DermRepo/outputs/mask2derm"
checkpoint_dir: "/content/drive/MyDrive/Mask2DermRepo/outputs/checkpoints"
samples_dir: "/content/drive/MyDrive/Mask2DermRepo/outputs/samples"

# --- Checkpointing & Logging ---
logging_steps: 50
validation_steps: 500
num_validation_images: 4
tracker: "wandb"
tracker_project: "mask2derm"

# --- Epoch samples ---
num_epoch_samples: 4
epoch_samples_steps: 20

# --- Inference defaults ---
validation_prompt: "dermoscopy image of a malignant skin lesion, irregular borders, clinical photography, high quality"
num_inference_steps: 20
guidance_scale: 7.5
