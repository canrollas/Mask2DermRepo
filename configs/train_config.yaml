# Mask2Derm Training Configuration — SDXL
# SG161222/RealVisXL_V4.0 (SDXL) + ControlNet seg

# --- Model ---
base_model: "SG161222/RealVisXL_V4.0"
controlnet_model: "from_unet"  # Initialize ControlNet from frozen UNet weights (no pretrained seg-map bias)

# --- Data ---
data_dir: "data/processed"
resolution: 512
apply_lens_simulation: false

# --- Training ---
train_batch_size: 20                 # Blackwell 100GB: ~84GB kullanır
gradient_accumulation_steps: 8       # effective batch: 8 x 8 = 64
num_train_epochs: 150
mixed_precision: "bf16"
dataloader_num_workers: 8
torch_compile: true

# --- Optimizer (AdamW) ---
learning_rate: 1.0e-5
lr_scheduler: "cosine"
lr_warmup_steps: 1000
adam_beta1: 0.9
adam_beta2: 0.999
adam_weight_decay: 0.01
adam_epsilon: 1.0e-8
max_grad_norm: 1.0

# --- Output paths ---
# Colab: set to /content/drive/MyDrive/Mask2DermRepo/outputs/...
output_dir: "outputs/mask2derm"
checkpoint_dir: "outputs/checkpoints"
samples_dir: "outputs/samples"

# --- Checkpointing & Logging ---
logging_steps: 10
validation_steps: 500
num_validation_images: 4
tracker: "wandb"
tracker_project: "mask2derm"

# --- Epoch samples ---
num_epoch_samples: 2
epoch_samples_steps: 15
save_samples_every_n_epochs: 1

# --- Inference defaults ---
validation_prompt: "dermoscopy image of a malignant skin lesion, irregular borders, clinical photography, high quality"
num_inference_steps: 30
guidance_scale: 9.0
controlnet_conditioning_scale: 0.8
